<!DOCTYPE html>
<html>
    <head>
        <title>Half-Bold Reader Main Page</title>
    </head>
    <head>
        <meta charset="utf-8" />
        <style>
            body {
                width: 32em;
            }
            #emboldenBtn {
                background-color: #384b70;
                border: none;
                color: #ffe9cf;
                text-align: center;
                font-size: 2em;
                width: 100%;
            }

            /*----------------------*/

            body {
              text-align: center;
            }

            label {
              font-size: 18px;
              margin: 0px;
            }

            #hidden-span {
              position: absolute;
              height: 0;
              overflow: hidden;
              white-space: pre;
            }

            .modifier-slot {relative;
              display:flex;
              -ms-flex-wrap:no-wrap;
              flex-wrap:no-wrap;
              -webkit-box-align:stretch;
              -ms-flex-align:stretch;
              align-items:stretch;
              width:100%;
            }

            .arrow-btn {
              border: none;
              background-color: transparent;

              text-align: center;
              text-decoration: none;
              margin: 0px 0px;
              padding: 0px;
              cursor: pointer;
            }

            .arrow-btn:hover {
              color: deepskyblue;
            }

            .arrow-btn:focus {
              outline:none;
              color: deepskyblue;
            }

            .modifier-index {
              display: flex;
              flex-direction: column;
              justify-content: space-around;

              background-color: whitesmoke;

              padding: 10px;
              border-radius: 8px 0px 0px 8px;
              border-width: 1px 0px 1px 1px;
              border-style: solid;
              border-color: gainsboro
            }

            .modifier-content {
              display: flex;
              flex: 1 1 auto;
              flex-direction: column;
              justify-content: center;
              gap: 10px;

              margin: 0px;
              border-radius: 0px 4px 4px 0px;
              border: 1px solid gainsboro;
            }

            .modifier-options {
              display: flex;
              flex-direction: row;
              justify-content: space-around;
              width: 100%;
            }

            .effect-range {
              display: inline-block;
            }

            .effect-options {
              display: flex;
            }

            .amount {
              display: inline-block;
              margin: 0px;
              font-size: 0px;
            }

            .amount input[type=number] {
              font-size: 1rem;

              width: 64px;
              margin-left: 7px;
              margin-right: 0px;
              border-radius: 5px 0px 0px 5px;
              border-width: 1px;

              padding: 0px 5px 0px 5px;

              -webkit-appearance: textfield;
              -moz-appearance: textfield;
              appearance: textfield;
            }

            .amount input[type=number]::-webkit-inner-spin-button, 
            .amount input[type=number]::-webkit-outer-spin-button { 
              -webkit-appearance: none;
            }

            .amount input[type=number]:focus{
              color:#495057;
              background-color:#fff;
              border-color:#80bdff;
              outline:0;
              box-shadow:0 0 0 .2rem rgba(0,123,255,.25)
            }

            .amount select {
              font-size: 1rem;

              margin-left: 0px;
              margin-right: 7px;
              border-radius: 0px 5px 5px 0px;
              padding: 0px;
            }

            .option {
              display: inline-block;
              margin: 0px;
              font-size: 0px;
            }

            .option select {
              font-size: 1rem;

              margin-left: 4px;
              margin-right: 4px;
              border-radius: 5px 5px 5px 5px;
              padding: 0px;
            }
        </style>
    </head>
    <body>
        <button id="emboldenBtn"><b>Emboldener</b></button>
        <h1>Half-Bold Reader</h1>
        <script defer src="popup.js" type="module"></script>

        <hr class="rounded">
        
        <div id="app">
          <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous"> -->

          <h2>Modifiers</h2>
          <p>Set the modifications (and their order) to be applied to all of the text on any given web page. The modifiers compound upon each other, executed in order from first to last.</p>

          <div class="row" id="modifiersList">
            <div class="modifier-slot">
              <div class="modifier-index">
                <button type="button" class="arrow-btn"><b>&and;</b></button>
                1
                <button type="button" class="arrow-btn"><b>&or;</b></button>
              </div>

              <div class="modifier-content">
                <div class="modifier-options">
                  <div class="option">
                    <label for="effect">Effect:</label>
                    <select class="" name="effect">
                      <option selected>bold</option>
                      <option>italic</option>
                    </select>
                  </div>
                  <div class="option">
                    <label for="characters">Characters:</label>
                    <select class="" name="characters">
                      <option selected>alphabetic</option>
                      <option>numeric</option>
                      <option>alphanumeric</option>
                    </select>
                  </div>
                </div>

                <div class="effect-range">
                  <div class="amount">
                    <input type="number" class="" aria-label="start" name="start" maxlength="4" size=2 value="198498142">
                    <select class="">
                      <option selected>%</option>
                      <option>characters</option>
                    </select>
                  </div>
                  <select class="">
                    <option selected>&lt;</option>
                    <option>&le;</option>
                  </select>
                  
                  Effected Text
                  
                  <select class="">
                    <option selected>&lt;</option>
                    <option>&le;</option>
                  </select>
                  
                  <div class="amount">
                    <input type="number" class="" aria-label="start" name="start" maxlength="4" size=2 value="0">
                    <select class="">
                      <option selected>%</option>
                      <option>characters</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
            
          </div>

          <button class="btn btn-primary m-3" type="submit">Add Modifier</button>
        </div>

    </body>
</html>
